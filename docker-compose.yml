version: "3.8"

services:
  app:
    image: apka
    build: .
    ports:
      - "5000:5000"
    networks:
      - mynetwork
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: bridge